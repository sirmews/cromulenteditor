id: no-console-in-production
category: clean-code
severity: warning
language: TypeScript
message: |
  Avoid leaving `console.log` in production code. Use `console.error` or `console.warn` for actual diagnostics, or remove the logging before committing.
  The "Clean Output" rule: `console.log` statements clutter the browser console in production and are often forgotten debugging artifacts.
rule:
  pattern: console.log($$$ARGS)
files:
  - 'src/**/*.ts'
  - 'src/**/*.tsx'
